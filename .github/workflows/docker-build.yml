

name: Build and Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code with full Git LFS support enabled
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Force Git LFS to pull down the actual heavy model weights
      - name: Pull LFS files
        run: git lfs pull

      # 3. Authenticate with Azure using your saved credentials
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Send the workspace (now containing actual weights) to ACR to build the image
      - name: Build and push image via ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image multimodal-rating-system:${{ github.sha }} \
            --file dockerfile .

      # 5. Deploy the complete image to your Container App
      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name multimodal-rating-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/multimodal-rating-system:${{ github.sha }}